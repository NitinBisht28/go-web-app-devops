kind: Deployment
apiVersion: apps/v1
metadata: 
  name: go-web-deployment
  namespace: prod
  labels:
    app: go-web-app
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: go-web-app
  template:
    metadata:
      labels:
        app: go-web-app
    spec:
      containers:
        - name: go-prod
          image: drakeexe/go-web-app:{{ .Values.image.tag }}
          ports:
            - containerPort: 8080